{% extends 'core/base.html' %}

{% block title %}Eliminar Usuario{% endblock %}

{% block content %}
    <div class="card shadow p-4 text-center" style="max-width: 500px; margin: auto;">
        <h2 class="mb-3">¿Eliminar usuario?</h2>
        <p class="mb-4">¿Estás seguro que deseas eliminar al usuario <strong>{{ perfil.user.username }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger w-100">Sí, eliminar</button>
        </form>
        <a href="{% url 'lista_usuarios' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
    </div>
{% endblock %}
